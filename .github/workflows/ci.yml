name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Run tests
        run: pytest tests/ -q

      - name: Lint Python
        run: ruff check partenon_api tests partenon_core/tools/intent_router.py partenon_core/tools/router.py

      - name: Check install script syntax
        run: bash -n install.sh

      - name: Scan for hardcoded secrets
        run: python .github/scripts/secret_scan.py

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: |
          cd dashboard
          npm ci

      - name: Lint dashboard
        run: |
          cd dashboard
          npm run lint

      - name: Build dashboard
        env:
          DASHBOARD_AUTH_SECRET: ci-test-secret-must-be-at-least-32-characters
          DASHBOARD_APP_USERNAME: ci_user
          DASHBOARD_APP_PASSWORD: ci_password_for_build_only
        run: |
          cd dashboard
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: partenon-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false
          tags: partenon-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    runs-on: ubuntu-latest
    needs: [python, dashboard, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Create environment file
        run: |
          cp .env.example .env
          echo "DASHBOARD_AUTH_SECRET=ci-dashboard-secret-32-chars-long-for-ci" >> .env
          echo "PARTENON_API_SECRET=ci-api-secret-32-chars-long-for-ci-run" >> .env
          echo "DASHBOARD_APP_USERNAME=ci_user" >> .env
          echo "DASHBOARD_APP_PASSWORD=ci_password_for_build_only" >> .env

      - name: Start services
        run: |
          docker compose up --build -d
          # Wait for the API health endpoint.
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Verify API health
        run: curl -sf http://localhost:8000/health/ready

      - name: Verify dashboard login page
        run: curl -sf -o /dev/null http://localhost:3000/login

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down
