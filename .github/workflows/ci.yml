name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: pytest tests/ -q

      - name: Scan for hardcoded secrets
        run: python .github/scripts/secret_scan.py

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: |
          cd dashboard
          npm ci

      - name: Lint dashboard
        run: |
          cd dashboard
          npm run lint

      - name: Build dashboard
        env:
          DASHBOARD_AUTH_SECRET: ci-test-secret-must-be-at-least-32-characters
          DASHBOARD_APP_USERNAME: ci_user
          DASHBOARD_APP_PASSWORD: ci_password_for_build_only
        run: |
          cd dashboard
          npm run build
