name: partenon-brain
version: 1.0.0
description: Memory and intelligence agent. Indexes decisions, searches context, detects
  conflicts.
hermes_requires: '>=0.14.0'
author: Partenon Authors
license: MIT
env_requires:
- name: OPENROUTER_API_KEY
  description: OpenRouter API key for model access
  required: true
- name: GBRAIN_DATABASE_URL
  description: Partenon memory database URL
  required: false
  default: sqlite:///data/gbrain.db
