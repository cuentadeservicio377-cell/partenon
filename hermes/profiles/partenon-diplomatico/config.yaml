profile:
  name: partenon-diplomatico
  display_name: Diplomat
  role: client and vendor relationships, CRM operations, meeting scheduling, follow-ups, proposals, and external communications
  files:
    relations: .relations
  version: 0.1.0

model:
  default: openrouter/google/gemini-2.5-flash-preview
  fallback: openrouter/anthropic/claude-sonnet-4

tools:
  core:
    - file
    - google_workspace
    - gbrain
  optional:
    - web_search
    - terminal

mcp_servers:
  - name: google_workspace
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-google-workspace"
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"

  - name: gbrain
    command: gbrain
    args:
      - serve
      - --stdio

  - name: gmail
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-gmail"
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"

memory:
  local:
    - .relations
    - output/proposals/
    - output/meetings/
  gbrain:
    page: partenon-diplomatico/memory
    missions: partenon-diplomatico/missions

logging:
  level: info
  destination: console
  file: logs/diplomat.log
