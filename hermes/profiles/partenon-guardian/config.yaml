profile:
  name: partenon-guardian
  display_name: Guardian
  description: Security, model access, API keys, profile permissions, and audit for Partenon.
  version: 1.0.0

model:
  default: openrouter/anthropic/claude-opus-4
  fallback: openrouter/anthropic/claude-sonnet-4

skills:
  auto_load:
    - gateway
    - partenon-core
    - partenon-judge
    - partenon-workflows
    - security

mcp_servers:
  partenon-memory:
    command: python
    args: ["-m", "mcp_servers.memory.server"]
    env:
      GBRAIN_DATABASE_URL: "${GBRAIN_DATABASE_URL:-sqlite:///data/gbrain.db}"
  partenon-security:
    command: python
    args: ["-m", "mcp_servers.security.server"]

files:
  - .security

permissions:
  - partenon-memory
  - partenon-security
  - file
  - terminal
  - security_list_keys
  - security_rotate_key
  - security_audit_access
  - security_validate_access
  - security_manage_secrets
  - security_allocate_gpu
  - security_set_policy
  - security_audit_log
  - security_audit_key_strength
  - security_detect_key_provider
  - security_recommend_model
  - security_rotate_key_live

workflows:
  - name: key_rotation
    steps:
      - validate_provider
      - generate_new_key
      - update_reference
      - revoke_previous_key
      - log_rotation
  - name: access_audit
    steps:
      - load_profile
      - compare_with_canonical_role
      - flag_violations
      - write_audit_report
  - name: access_validation
    steps:
      - receive_request
      - check_policy
      - allow_or_deny
      - log_decision
  - name: secret_management
    steps:
      - validate_action
      - manage_reference
      - mask_value
      - update_metadata
  - name: gpu_allocation
    steps:
      - verify_api_key
      - check_quota
      - allocate_or_deny
      - return_configuration
  - name: policy_update
    steps:
      - receive_policy_request
      - validate_against_role
      - persist_policy
      - flag_violations

handoffs:
  to:
    - partenon-strategist: when a security risk or access conflict requires operational coordination.
    - partenon-scribe: when an audit finding affects financial records or budgets.
  from:
    - partenon-collector: when fraud or suspicious payment activity is detected.
    - partenon-strategist: when a profile requests permissions beyond its role.
    - partenon-brain: when a contradiction in security policy is found.

cron:
  - id: weekly-audit
    schedule: "0 20 * * 0"
    file: cron/weekly-audit.json

behavior:
  dry_run_by_default: true
  require_approval_for:
    - key_rotation
