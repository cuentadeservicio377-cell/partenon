# Profile: partenon-guardian
# Role: Security, models, API keys, profile permissions, and audit.

profile:
  name: partenon-guardian
  display_name: Guardian
  description: Security, model access, API keys, profile permissions, and audit for Partenon.
  version: 0.1.0
  hermes_agent: true

model:
  provider: openrouter
  model: openrouter/anthropic/claude-opus-4

agent:
  max_iterations: 40
  enabled_toolsets:
    - terminal
    - file
    - gbrain

mcp:
  servers:
    - gbrain

memory:
  memory_enabled: true

skills:
  auto_load:
    - security
