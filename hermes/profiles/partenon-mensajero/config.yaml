profile:
  name: partenon-herald
  display_name: Herald
  role: communications, brand, content, editorial calendar, SEO/GEO, presentations, email, and WordPress
  files:
    design: .design
  version: 0.1.0

model:
  default: openrouter/google/gemini-2.5-flash-preview-05-20
  fallback: openrouter/anthropic/claude-sonnet-4-20250514
  reasoning: openrouter/anthropic/claude-opus-4

tools:
  core:
    - file
    - terminal
    - google_workspace
    - gbrain
    - social_media
    - open_design
  optional:
    - web_search
    - wordpress
    - ssh
    - mailchimp

mcp_servers:
  - google_workspace
  - gbrain
  - gmail
  - social_media
  - open_design

memory:
  local:
    - .design
    - output/campaigns/
    - output/copy/
  gbrain:
    page: partenon-herald/memory
    missions: partenon-herald/missions

logging:
  level: info
  destination: console
  file: logs/herald.log
