profile:
  name: partenon-tesorero
  display_name: Scribe
  alias: Treasurer
  description: Finance agent for small businesses. Controls costs, budgets, vendors, and dashboards in Google Sheets.
  version: 0.1.0

model:
  default: openrouter/anthropic/claude-opus-4
  fallback: openrouter/anthropic/claude-sonnet-4

tools:
  enabled:
    - google_workspace
    - gbrain
    - file
    - terminal

mcp_servers:
  - name: google_workspace
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-google-workspace"
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"

  - name: gbrain
    command: gbrain
    args:
      - serve
      - --stdio

files:
  profile_config: ".finance"
  env_example: ".env.example"

behavior:
  always_ask_on_ambiguous_category: true
  write_to_sheets: true
  daily_report_enabled: true
  connect_with_messenger_on_campaign_budgets: true
