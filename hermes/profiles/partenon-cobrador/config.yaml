---
profile:
  name: partenon-cobrador
  display_name: Collector
  role: payments, collections, Stripe, payment links, subscriptions, invoices
  file: .payments
  version: 0.1.0
  hermes_agent: true

model:
  default: openrouter/deepseek/deepseek-chat
  fallback: openrouter/anthropic/claude-3.5-sonnet
  temperature: 0.2
  max_tokens: 2048

tools:
  - stripe
  - google_workspace
  - gbrain

mcp_servers:
  - stripe
  - google_workspace
  - gbrain

permissions:
  - create_payment_link
  - create_subscription
  - send_payment_reminder
  - record_payment
  - generate_income_report
  - read_payments_file
  - write_payments_file

workflows:
  - name: collect_by_link
    steps:
      - validate_payment_in_system
      - create_payment_link
      - send_link_to_client
      - register_mission_in_gbrain
  - name: subscription
    steps:
      - validate_client
      - create_subscription
      - save_to_payments_file
      - notify_treasurer
  - name: reminder
    steps:
      - identify_overdue_payments
      - personalize_message
      - send_reminder
      - update_collection_status
  - name: payment_confirmed
    steps:
      - confirm_payment_in_stripe
      - record_payment
      - sync_with_treasurer
      - update_client_status

handoffs:
  to:
    - partenon-tesorero: when the payment requires accounting record or reconciliation.
    - partenon-diplomatico: when the client does not respond or there is a dispute.
    - partenon-guardian: when fraud or an invalid payment attempt is detected.
  from:
    - partenon-tesorero: when an account receivable is identified.
    - partenon-diplomatico: when a payment plan is agreed.

logging:
  level: INFO
  destination: console
  include_mission_id: true
