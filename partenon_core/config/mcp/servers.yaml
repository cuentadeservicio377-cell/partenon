# MCP Servers Configuration for Partenon
# Model Context Protocol — connects Partenon hero profiles to tools.
# Copy this block into ~/.hermes/config.yaml under mcp_servers or use `hermes mcp add <server>`.

mcp_servers:
  # === Partenon domain wrappers (dry-run by default) ===
  partenon-memory:
    command: python
    args: ["-m", "mcp_servers.memory.server"]
    env:
      GBRAIN_DATABASE_URL: "${GBRAIN_DATABASE_URL:-sqlite:///data/gbrain.db}"
    description: "Shared brain of Partenon: profiles, missions, and entities"
    enabled: true
    tags: ["memory", "context"]

  partenon-finance:
    command: python
    args: ["-m", "mcp_servers.finance.server"]
    description: "Dry-run finance tools: parse, classify, dashboard"
    enabled: true
    tags: ["finance", "dry-run"]

  partenon-payments:
    command: python
    args: ["-m", "mcp_servers.payments.server"]
    description: "Dry-run payment tools: links, invoices, overdue"
    enabled: true
    tags: ["payments", "dry-run"]

  partenon-comms:
    command: python
    args: ["-m", "mcp_servers.comms.server"]
    description: "Dry-run communication tools: copy, calendar, presentations"
    enabled: true
    tags: ["communication", "dry-run"]

  partenon-security:
    command: python
    args: ["-m", "mcp_servers.security.server"]
    description: "Dry-run security tools: key audit, rotation, policies"
    enabled: true
    tags: ["security", "dry-run"]

  partenon-ops:
    command: python
    args: ["-m", "mcp_servers.ops.server"]
    description: "Dry-run operations tools: projects, tasks, briefings"
    enabled: true
    tags: ["operations", "dry-run"]

  partenon-relations:
    command: python
    args: ["-m", "mcp_servers.relations.server"]
    description: "Dry-run relations tools: clients, follow-ups, proposals"
    enabled: true
    tags: ["relations", "dry-run"]

  # === Google Workspace (Sheets, Docs, Slides, Drive, Calendar, Gmail) ===
  google_workspace:
    command: npx
    args: ["-y", "@taylorwilsdon/google-workspace-mcp"]
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"
    description: "Shared work surface with the company"
    enabled: true
    tags: ["workspace", "sheets", "docs", "slides", "drive", "calendar", "gmail"]

  # === Payments ===
  stripe:
    command: npx
    args: ["-y", "@stripe/mcp"]
    env:
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
    description: "Processes payments, subscriptions, and invoicing"
    enabled: true
    tags: ["payments", "finance"]

  # === Email ===
  gmail:
    command: npx
    args: ["-y", "@gonggyu/mcp-server-gmail"]
    env:
      GMAIL_ACCESS_TOKEN: "${GMAIL_ACCESS_TOKEN}"
    description: "Sends formal emails from the agent"
    enabled: true
    tags: ["communication", "documents"]

  # === Calendar and scheduling ===
  calendly:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-calendly"]
    env:
      CALENDLY_API_KEY: "${CALENDLY_API_KEY}"
    description: "Lets clients book appointments directly"
    enabled: false
    tags: ["sales", "operations", "calendar"]

  # === Team notifications ===
  slack:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-slack"]
    env:
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
    description: "Notifications and team communication"
    enabled: false
    tags: ["communication", "team"]

# === MCP filters by Partenon profile ===
# Each list must match the `mcp_servers` block in the corresponding profile config.yaml.
mcp_filters:
  scribe:
    allow: ["partenon-memory", "partenon-finance", "google_workspace", "stripe"]
  herald:
    allow: ["partenon-memory", "partenon-comms", "google_workspace", "gmail"]
  collector:
    allow: ["partenon-memory", "partenon-payments", "google_workspace", "stripe", "gmail"]
  guardian:
    allow: ["partenon-memory", "partenon-security"]
  strategist:
    allow: ["partenon-memory", "partenon-ops", "google_workspace", "gmail"]
  diplomat:
    allow: ["partenon-memory", "partenon-relations", "google_workspace", "gmail"]
  brain:
    allow: ["partenon-memory"]
