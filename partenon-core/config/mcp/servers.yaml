# MCP Servers Configuration for Partenon
# Model Context Protocol — connects Partenon hero profiles to external tools.
# Copy this block into ~/.hermes/config.yaml under mcp_servers or use `hermes mcp add <server>`.

mcp_servers:
  # === Google Workspace (Sheets, Docs, Slides, Drive, Calendar, Gmail) ===
  google_workspace:
    command: npx
    args: ["-y", "@taylorwilsdon/google-workspace-mcp"]
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"
    description: "Shared work surface with the company"
    enabled: true
    tags: ["workspace", "sheets", "docs", "slides", "drive", "calendar", "gmail"]

  # === Payments ===
  stripe:
    command: npx
    args: ["-y", "@stripe/mcp"]
    env:
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
    description: "Processes payments, subscriptions, and invoicing"
    enabled: true
    tags: ["payments", "finance"]

  # === Email ===
  gmail:
    command: npx
    args: ["-y", "@gonggyu/mcp-server-gmail"]
    env:
      GMAIL_ACCESS_TOKEN: "${GMAIL_ACCESS_TOKEN}"
    description: "Sends formal emails from the agent"
    enabled: true
    tags: ["communication", "documents"]

  # === Calendar and scheduling ===
  calendly:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-calendly"]
    env:
      CALENDLY_API_KEY: "${CALENDLY_API_KEY}"
    description: "Lets clients book appointments directly"
    enabled: false
    tags: ["sales", "operations", "calendar"]

  # === Shared memory ===
  gbrain:
    command: python
    args: ["-m", "gbrain.server"]
    env:
      DATABASE_URL: "${GBRAIN_DATABASE_URL:-postgresql://localhost:5432/gbrain}"
    description: "Shared brain of Partenon: profiles, missions, and entities"
    enabled: true
    tags: ["memory", "context"]

  # === Team notifications ===
  slack:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-slack"]
    env:
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
    description: "Notifications and team communication"
    enabled: false
    tags: ["communication", "team"]

# === MCP filters by Partenon profile ===
mcp_filters:
  scribe:
    allow: ["google_workspace", "stripe", "gbrain"]
  herald:
    allow: ["google_workspace", "gmail", "calendly", "gbrain"]
  collector:
    allow: ["google_workspace", "stripe", "gmail", "gbrain"]
  guardian:
    allow: ["gbrain"]
  strategist:
    allow: ["google_workspace", "gmail", "calendly", "slack", "gbrain"]
  diplomat:
    allow: ["google_workspace", "gmail", "calendly", "gbrain"]
  brain:
    allow: ["gbrain"]
